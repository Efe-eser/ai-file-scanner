<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI File Scanner</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #080c14;
            --card: #0f1923;
            --border: rgba(56,189,248,0.12);
            --accent: #38bdf8;
            --accent2: #818cf8;
            --safe: #22c55e;
            --warn: #f59e0b;
            --danger: #ef4444;
            --text: #e2e8f0;
            --muted: #64748b;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: var(--bg);
            font-family: 'Syne', sans-serif;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

            body::before {
                content: '';
                position: fixed;
                inset: 0;
                background-image: linear-gradient(rgba(56,189,248,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(56,189,248,0.03) 1px, transparent 1px);
                background-size: 40px 40px;
                pointer-events: none;
                z-index: 0;
            }

            body::after {
                content: '';
                position: fixed;
                width: 700px;
                height: 700px;
                border-radius: 50%;
                background: radial-gradient(circle, rgba(56,189,248,0.055) 0%, transparent 70%);
                top: 50%;
                left: 50%;
                transform: translate(-50%,-50%);
                pointer-events: none;
                z-index: 0;
            }

        nav {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 700px;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 30px 24px 0;
        }

        .logo-svg {
            width: 54px;
            height: 54px;
            flex-shrink: 0;
            filter: drop-shadow(0 0 12px rgba(56,189,248,0.38));
        }

        .logo-name {
            display: flex;
            align-items: baseline;
            gap: 0;
            white-space: nowrap;
        }

            .logo-name .part-file {
                font-size: 1.5rem;
                font-weight: 800;
                letter-spacing: -0.03em;
                background: linear-gradient(135deg, #e2e8f0 0%, #94a3b8 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            .logo-name .part-xray {
                font-size: 1.5rem;
                font-weight: 800;
                letter-spacing: -0.03em;
                background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            .logo-name .part-dot {
                font-size: 1.5rem;
                font-weight: 300;
                color: rgba(56,189,248,0.35);
                -webkit-text-fill-color: rgba(56,189,248,0.35);
                margin: 0 2px;
            }

            .logo-name .part-sub {
                font-family: 'JetBrains Mono', monospace;
                font-size: 0.6rem;
                font-weight: 500;
                letter-spacing: 0.15em;
                text-transform: uppercase;
                align-self: center;
                color: var(--muted);
                -webkit-text-fill-color: var(--muted);
                margin-left: 12px;
                padding-left: 12px;
                border-left: 1px solid rgba(56,189,248,0.18);
            }

        .nav-pill {
            margin-left: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            color: var(--accent);
            border: 1px solid rgba(56,189,248,0.22);
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(56,189,248,0.04);
            white-space: nowrap;
        }

        main {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 520px;
            padding: 24px 20px 60px;
            margin-top: 32px;
            display: flex;
            flex-direction: column;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 42px 36px;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.5), 0 40px 80px rgba(0,0,0,0.5);
        }

        /* ── UPLOAD FORM ── */
        #uploadForm {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .fp-wrap {
            width: 110px;
            height: 110px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fp-ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(56,189,248,0.18);
            animation: fp-pulse 2.4s ease-out infinite;
        }

            .fp-ring:nth-child(1) {
                width: 110px;
                height: 110px;
                animation-delay: 0s;
            }

            .fp-ring:nth-child(2) {
                width: 84px;
                height: 84px;
                animation-delay: .45s;
            }

            .fp-ring:nth-child(3) {
                width: 60px;
                height: 60px;
                animation-delay: .9s;
            }

        @keyframes fp-pulse {
            0% {
                opacity: .7;
                transform: scale(.88);
            }

            70% {
                opacity: 0;
                transform: scale(1.12);
            }

            100% {
                opacity: 0;
                transform: scale(1.12);
            }
        }

        .fp-icon {
            width: 46px;
            height: 46px;
            position: relative;
            z-index: 2;
        }

        .fp-scanline {
            position: absolute;
            z-index: 3;
            left: 50%;
            transform: translateX(-50%);
            width: 42px;
            height: 2px;
            background: linear-gradient(90deg,transparent,var(--accent),transparent);
            border-radius: 2px;
            animation: scanline 2s ease-in-out infinite;
        }

        @keyframes scanline {
            0% {
                top: calc(50% - 20px);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                top: calc(50% + 20px);
                opacity: 0;
            }
        }

        .upload-box {
            width: 100%;
            border: 1.5px dashed rgba(56,189,248,0.2);
            border-radius: 14px;
            padding: 26px 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: border-color .2s, background .2s;
            background: rgba(56,189,248,0.02);
        }

            .upload-box:hover {
                border-color: rgba(56,189,248,0.45);
                background: rgba(56,189,248,0.05);
                box-shadow: 0 0 24px rgba(56,189,248,0.07);
            }

        .upload-icon {
            color: var(--accent);
            opacity: .7;
            transition: opacity .2s, transform .2s;
        }

        .upload-box:hover .upload-icon {
            opacity: 1;
            transform: translateY(-2px);
        }

        .upload-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: .75rem;
            color: var(--muted);
            letter-spacing: .04em;
        }

            .upload-label span {
                color: var(--accent);
                text-decoration: underline;
                text-underline-offset: 3px;
            }

        .file-chosen {
            font-family: 'JetBrains Mono', monospace;
            font-size: .72rem;
            color: var(--accent);
            max-width: 260px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: none;
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 11px;
            font-family: 'Syne',sans-serif;
            font-weight: 700;
            font-size: .92rem;
            letter-spacing: .07em;
            text-transform: uppercase;
            cursor: pointer;
            background: linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);
            color: #070c18;
            transition: opacity .2s, transform .1s;
            position: relative;
            overflow: hidden;
        }

            .btn:hover {
                opacity: .88;
                transform: translateY(-1px);
            }

            .btn:active {
                transform: translateY(0);
            }

            .btn::after {
                content: '';
                position: absolute;
                top: 0;
                left: -100%;
                width: 55%;
                height: 100%;
                background: linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent);
                animation: shimmer 2.8s ease-in-out infinite;
            }

        @keyframes shimmer {
            0% {
                left: -100%
            }

            60% {
                left: 140%
            }

            100% {
                left: 140%
            }
        }

        /* ── SCANNING ── */
        #scanningBlock {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }

        .spin-wrap {
            width: 64px;
            height: 64px;
            position: relative;
        }

            .spin-wrap svg {
                overflow: visible;
            }

        .prog-track {
            width: 100%;
            height: 3px;
            background: rgba(56,189,248,.08);
            border-radius: 99px;
            overflow: hidden;
        }

        .prog-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg,var(--accent),var(--accent2));
            border-radius: 99px;
            transition: width .35s ease;
        }

        .scan-status {
            font-family: 'JetBrains Mono',monospace;
            font-size: .68rem;
            color: var(--muted);
            letter-spacing: .1em;
        }

        /* ── RESULT ── */
        #result {
            display: none;
            flex-direction: column;
            gap: 0;
            animation: fade-up .45s ease;
        }

        @keyframes fade-up {
            from {
                opacity: 0;
                transform: translateY(12px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .verdict-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
        }

        .verdict-label {
            font-family: 'JetBrains Mono',monospace;
            font-size: .6rem;
            letter-spacing: .12em;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .status {
            font-size: 1.9rem;
            font-weight: 800;
            letter-spacing: -.02em;
        }

        .safe {
            color: var(--safe);
            text-shadow: 0 0 24px rgba(34,197,94,.3);
        }

        .suspicious {
            color: var(--warn);
            text-shadow: 0 0 24px rgba(245,158,11,.3);
        }

        .malicious {
            color: var(--danger);
            text-shadow: 0 0 24px rgba(239,68,68,.3);
        }

        .score-badge {
            font-family: 'JetBrains Mono',monospace;
            font-size: 1.45rem;
            font-weight: 500;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

            .score-badge small {
                font-size: .58rem;
                color: var(--muted);
                letter-spacing: .1em;
                font-weight: 400;
            }

        .risk-bar-track {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,.05);
            border-radius: 99px;
            overflow: hidden;
            margin-bottom: 18px;
        }

        .risk-bar-fill {
            height: 100%;
            width: 0%;
            border-radius: 99px;
            transition: width 1s cubic-bezier(.22,1,.36,1);
        }

        .info-block {
            background: rgba(255,255,255,.025);
            border: 1px solid rgba(255,255,255,.055);
            border-radius: 12px;
            padding: 15px 16px;
            margin-bottom: 10px;
            transition: border-color .2s;
        }

            .info-block:hover {
                border-color: rgba(56,189,248,.14);
            }

            .info-block:last-of-type {
                margin-bottom: 0;
            }

        .block-title {
            font-size: .62rem;
            font-weight: 700;
            letter-spacing: .11em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

            .block-title::after {
                content: '';
                flex: 1;
                height: 1px;
                background: rgba(255,255,255,.05);
            }

        .block-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2px 0;
        }

        .block-row-key {
            font-family: 'JetBrains Mono',monospace;
            font-size: .74rem;
            color: #94a3b8;
        }

        .block-row-val {
            font-family: 'JetBrains Mono',monospace;
            font-size: .74rem;
            font-weight: 500;
        }

        .ai-text {
            font-family: 'JetBrains Mono',monospace;
            font-size: .76rem;
            color: #94a3b8;
            line-height: 1.65;
        }

        .reset-btn {
            margin-top: 18px;
            width: 100%;
            padding: 11px;
            border-radius: 10px;
            border: 1px solid rgba(56,189,248,.18);
            background: transparent;
            color: var(--accent);
            font-family: 'Syne',sans-serif;
            font-size: .8rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: .04em;
            transition: background .2s, border-color .2s;
        }

            .reset-btn:hover {
                background: rgba(56,189,248,.06);
                border-color: rgba(56,189,248,.38);
            }

        .ai-badge {
            margin-top: 12px;
            align-self: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            letter-spacing: 0.12em;
            color: var(--accent);
            border: 1px solid rgba(56,189,248,0.22);
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(56,189,248,0.04);
        }

        @keyframes spin-arc {
            from {
                transform: rotate(-90deg)
            }

            to {
                transform: rotate(270deg)
            }
        }
    </style>
</head>

<body>

    <nav>
        <svg class="logo-svg" viewBox="0 0 34 34" fill="none">
            <circle cx="17" cy="17" r="16" stroke="url(#nl)" stroke-width="1.4" opacity="0.5" />
            <path d="M17 7 L25 11 L25 19 C25 23.5 21.2 27.2 17 29 C12.8 27.2 9 23.5 9 19 L9 11 Z"
                  fill="url(#nf)" opacity="0.12" stroke="url(#nl)" stroke-width="1.2" />
            <path d="M17 15 C15.3 15 14 16.3 14 18 C14 19.7 15.3 21 17 21" stroke="url(#nl)" stroke-width="1.4" stroke-linecap="round" fill="none" />
            <path d="M17 12 C13.7 12 11 14.7 11 18 C11 21 13.2 23.5 17 25" stroke="url(#nl)" stroke-width="1.1" stroke-linecap="round" fill="none" opacity="0.55" />
            <circle cx="17" cy="18" r="1.5" fill="url(#nl)" />
            <defs>
                <linearGradient id="nl" x1="0" y1="0" x2="34" y2="34" gradientUnits="userSpaceOnUse">
                    <stop stop-color="#38bdf8" />
                    <stop offset="1" stop-color="#818cf8" />
                </linearGradient>
                <linearGradient id="nf" x1="9" y1="7" x2="25" y2="29" gradientUnits="userSpaceOnUse">
                    <stop stop-color="#38bdf8" />
                    <stop offset="1" stop-color="#818cf8" />
                </linearGradient>
            </defs>
        </svg>
        <div class="logo-name">
            <span class="part-file">File</span><span class="part-dot">·</span><span class="part-xray">X-ray</span>
            <span class="part-sub">AI File Scanner</span>
        </div>

    </nav>

    <main>
        <div class="card">

            <!-- UPLOAD FORM — original IDs preserved -->
            <form id="uploadForm">
                <div class="fp-wrap">
                    <div class="fp-ring"></div>
                    <div class="fp-ring"></div>
                    <div class="fp-ring"></div>
                    <svg class="fp-icon" viewBox="0 0 46 46" fill="none">
                        <path d="M23 10C16.4 10 11 15.4 11 22 C11 29.8 16.5 34.5 23 37" stroke="url(#fpl)" stroke-width="1.8" stroke-linecap="round" fill="none" />
                        <path d="M23 15C19.1 15 16 18.1 16 22 C16 26.2 18.8 29.4 23 31" stroke="url(#fpl)" stroke-width="1.8" stroke-linecap="round" fill="none" />
                        <path d="M23 20C21.3 20 20 21.3 20 23 C20 24.8 21.2 26.1 23 27" stroke="url(#fpl)" stroke-width="1.8" stroke-linecap="round" fill="none" />
                        <path d="M23 10C29.6 10 35 15.4 35 22 C35 29.8 29.5 34.5 23 37" stroke="url(#fpl)" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.45" />
                        <path d="M23 15C26.9 15 30 18.1 30 22 C30 26.2 27.2 29.4 23 31" stroke="url(#fpl)" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.45" />
                        <path d="M23 20C24.7 20 26 21.3 26 23 C26 24.8 24.8 26.1 23 27" stroke="url(#fpl)" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.45" />
                        <circle cx="23" cy="22" r="2.2" fill="url(#fpl)" />
                        <defs>
                            <linearGradient id="fpl" x1="11" y1="10" x2="35" y2="37" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#38bdf8" />
                                <stop offset="1" stop-color="#818cf8" />
                            </linearGradient>
                        </defs>
                    </svg>
                    <div class="fp-scanline"></div>
                </div>

                <label class="upload-box" for="fileInput">
                    <svg class="upload-icon" width="26" height="26" viewBox="0 0 26 26" fill="none">
                        <path d="M13 3 L13 17 M13 3 L8 8 M13 3 L18 8" stroke="#38bdf8" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M3 19 L3 22 C3 23 3.9 23.8 5 23.8 L21 23.8 C22.1 23.8 23 23 23 22 L23 19" stroke="#38bdf8" stroke-width="1.7" stroke-linecap="round" opacity="0.45" />
                    </svg>
                    <div class="upload-label">Drop file here or <span>choose file</span></div>
                    <div class="file-chosen" id="fileChosen"></div>
                    <input type="file" id="fileInput" required>
                </label>

                <button class="btn" type="submit">Scan File</button>
            </form>

            <!-- SCANNING BLOCK -->
            <div id="scanningBlock">
                <div class="spin-wrap">
                    <svg width="64" height="64" viewBox="0 0 64 64">
                        <circle cx="32" cy="32" r="27" stroke="rgba(56,189,248,0.08)" stroke-width="3" fill="none" />
                        <circle cx="32" cy="32" r="27" stroke="url(#sc)" stroke-width="3" fill="none"
                                stroke-dasharray="170" stroke-dashoffset="170"
                                style="transform-origin:center;animation:spin-arc 1.4s linear infinite;" />
                        <defs>
                            <linearGradient id="sc" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#38bdf8" />
                                <stop offset="1" stop-color="#818cf8" />
                            </linearGradient>
                        </defs>
                    </svg>
                    <svg style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)" width="26" height="26" viewBox="0 0 26 26" fill="none">
                        <path d="M13 4C17.4 4 21 7.6 21 12 C21 16.6 17.5 19.8 13 21" stroke="url(#sc2)" stroke-width="1.6" stroke-linecap="round" fill="none" />
                        <path d="M13 8C15.2 8 17 9.8 17 12 C17 14.3 15.3 16 13 17" stroke="url(#sc2)" stroke-width="1.6" stroke-linecap="round" fill="none" />
                        <circle cx="13" cy="12" r="1.6" fill="url(#sc2)" />
                        <defs>
                            <linearGradient id="sc2" x1="4" y1="4" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#38bdf8" />
                                <stop offset="1" stop-color="#818cf8" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
                <div class="scan-status" id="scanStatus">INITIALIZING...</div>
            </div>

            <!-- RESULT — same #result id as original -->
            <div id="result"></div>

        </div>
        <div class="ai-badge">AI · POWERED</div>
    </main>

    <script>
        const API_URL = window.location.origin;

        document.getElementById("fileInput").addEventListener("change", function() {
        const fc = document.getElementById("fileChosen");
        if (this.files.length) { fc.textContent = this.files[0].name; fc.style.display = "block"; }
        });

        const STEPS = [
        "INITIALIZING...", "READING FILE HEADERS...", "CHECKING SIGNATURES...",
        "QUERYING VIRUSTOTAL...", "RUNNING AI ANALYSIS...",
        "COMPUTING RISK SCORE...", "FINALIZING REPORT..."
        ];

        document.getElementById("uploadForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        let file = document.getElementById("fileInput").files[0];
        if (!file) return alert("Select a file first.");

        let formData = new FormData();
        formData.append("file", file);

        document.getElementById("uploadForm").style.display = "none";
        document.getElementById("scanningBlock").style.display = "flex";
        document.getElementById("result").style.display = "none";
        document.getElementById("result").innerHTML = "";

        let progress = 0, stepIdx = 0;
        const progFill = document.getElementById("progFill");
        const scanStatus = document.getElementById("scanStatus");

        const interval = setInterval(() => {
        progress += Math.random() * 13 + 3;
        if (progress > 92) progress = 92;
        progFill.style.width = progress + "%";
        if (stepIdx < STEPS.length - 1) scanStatus.textContent = STEPS[++stepIdx];
        }, 380);

        try {
        let res  = await fetch(`${API_URL}/api/upload/`, { method: "POST", body: formData });
        let data = await res.json();

        clearInterval(interval);
        progFill.style.width = "100%";
        scanStatus.textContent = "COMPLETE";
        setTimeout(() => showResult(data), 380);

        } catch(err) {
        clearInterval(interval);
        document.getElementById("scanningBlock").style.display = "none";
        document.getElementById("uploadForm").style.display = "flex";
        const r = document.getElementById("result");
        r.style.display = "flex";
        r.innerHTML = `<div style="font-family:'JetBrains Mono',monospace;font-size:.78rem;color:#ef4444;padding:12px 0;">CONNECTION ERROR — check server.</div>`;
        }
        });

        function showResult(data) {
        document.getElementById("scanningBlock").style.display = "none";

        let cls = "safe";
        if (data.status === "MALICIOUS")   cls = "malicious";
        else if (data.status === "SUSPICIOUS") cls = "suspicious";

        const score = data.risk_score || 0;
        const colorMap = { safe:"#22c55e", suspicious:"#f59e0b", malicious:"#ef4444" };
        const barColor = colorMap[cls];

        const r = document.getElementById("result");
        r.style.display = "flex";
        r.innerHTML = `
        <div class="verdict-row">
        <div>
        <div class="verdict-label">Threat Assessment</div>
        <div class="status ${cls}">${data.status}</div>
        </div>
        <div class="score-badge" style="color:${barColor}">
        ${score}%
        <small>RISK SCORE</small>
        </div>
        </div>

        <div class="risk-bar-track">
        <div class="risk-bar-fill" id="riskBar" style="background:${barColor}"></div>
        </div>

        ${data.ai_comment ? `
        <div class="info-block">
        <div class="block-title">AI Analysis</div>
        <p class="ai-text">${data.ai_comment}</p>
        </div>` : ""}

        ${data.vt_malicious !== undefined ? `
        <div class="info-block">
        <div class="block-title">VirusTotal</div>
        <div class="block-row">
        <span class="block-row-key">Malicious</span>
        <span class="block-row-val" style="color:${data.vt_malicious > 0 ? '#ef4444' : '#22c55e'}">${data.vt_malicious}</span>
        </div>
        <div class="block-row">
        <span class="block-row-key">Suspicious</span>
        <span class="block-row-val" style="color:${data.vt_suspicious > 0 ? '#f59e0b' : '#22c55e'}">${data.vt_suspicious}</span>
        </div>
        </div>` : ""}

        ${data.entropy !== undefined ? `
        <div class="info-block">
        <div class="block-title">Static Analysis</div>
        <div class="block-row">
        <span class="block-row-key">Entropy</span>
        <span class="block-row-val" style="color:#38bdf8">${data.entropy}</span>
        </div>
        <div class="block-row">
        <span class="block-row-key">Strings</span>
        <span class="block-row-val" style="color:${data.strings && data.strings !== 'None' ? '#f59e0b' : '#38bdf8'}">${data.strings || 'None'}</span>
        </div>
        </div>` : ""}

        <button class="reset-btn" onclick="resetScanner()">&#8592; Scan Another File</button>
        `;

        setTimeout(() => {
        const bar = document.getElementById("riskBar");
        if (bar) bar.style.width = Math.min(score, 100) + "%";
        }, 80);
        }

        function resetScanner() {
        document.getElementById("fileInput").value = "";
        document.getElementById("fileChosen").style.display = "none";
        document.getElementById("result").innerHTML = "";
        document.getElementById("result").style.display = "none";
        document.getElementById("progFill").style.width = "0%";
        document.getElementById("uploadForm").style.display = "flex";
        }
    </script>

</body>
</html>
