<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>AI File Scanner</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle at top, #0f172a, #020617);
            font-family: Arial;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 420px;
            text-align: center;
        }

        .upload-box {
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 40px;
            transition: 0.3s;
            cursor: pointer;
        }

            .upload-box:hover {
                border-color: #38bdf8;
                box-shadow: 0 0 25px rgba(56,189,248,0.2);
            }

        /* ICON */
        .icon {
            font-size: 55px;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .upload-box:hover .icon {
            transform: scale(1.1);
        }

        /* HIDDEN INPUT */
        input {
            display: none;
        }

        /* BUTTON */
        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(90deg, #22c55e, #4ade80);
            color: white;
            cursor: pointer;
            font-size: 15px;
        }

        /* STATUS */
        .status {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
        }

        .safe {
            color: #22c55e;
        }

        .suspicious {
            color: #facc15;
        }

        .malicious {
            color: #ef4444;
        }

        /* SCANNING ANIMATION */
        .scanning {
            margin-top: 20px;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #38bdf8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: auto;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* PULSE EFFECT */
        .pulse {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.5;
                transform: scale(0.95);
            }

            50% {
                opacity: 1;
                transform: scale(1.05);
            }

            100% {
                opacity: 0.5;
                transform: scale(0.95);
            }
        }
    </style>
</head>

<body>

    <div class="card">

        <form id="uploadForm">

            <label class="upload-box">
                <div class="icon" id="icon">📄🔬</div>
                <div>Choose file</div>
                <input type="file" id="fileInput" required>
            </label>

            <button class="btn" type="submit">Scan File</button>

        </form>

        <div id="result"></div>

    </div>

    <script>
        const API_URL = "http://51.21.245.128:8000";

        document.getElementById("uploadForm").addEventListener("submit", async function(e){
        e.preventDefault();

        let file = document.getElementById("fileInput").files[0];
        if (!file) return alert("Select file");

        let formData = new FormData();
        formData.append("file", file);

        // ANIMATION START
        document.getElementById("result").innerHTML = `
        <div class="scanning pulse">
        <div class="loader"></div>
        <div>Scanning...</div>
        </div>
        `;

        document.getElementById("icon").innerText = "🔍";

        try {
        let res = await fetch(`${API_URL}/api/upload/`, {
        method: "POST",
        body: formData
        });

        let data = await res.json();

        let cls = "safe";
        if (data.status === "MALICIOUS") cls = "malicious";
        else if (data.status === "SUSPICIOUS") cls = "suspicious";

        document.getElementById("icon").innerText = "📄";

        document.getElementById("result").innerHTML = `
        <div class="status ${cls}">
        ${data.status}
        </div>
        <div>Risk: ${data.risk_score}%</div>
        `;

        } catch(err){
        console.log(err);
        document.getElementById("result").innerHTML = "ERROR!";
        }
        });
    </script>

</body>
</html>
